<ion-header>
  <ion-toolbar>
    <ion-title>{{ tkey('reviews') }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="solid" color="primary" class="fancy-button" (click)="close()">{{ tkey('close') || 'Close' }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col size="12" class="avg" *ngIf="avg !== null">
        <ion-icon name="star" class="avg-star"></ion-icon>
        {{ tkey('average_rating') }}: {{ avg }}
      </ion-col>
    </ion-row>
    <ion-row *ngIf="!loading && reviews.length === 0">
      <ion-col size="12">{{ tkey('no_reviews') }}</ion-col>
    </ion-row>
    <ion-row *ngFor="let rev of reviews; let ri = index">
      <ion-col size="12">
        <ion-card>
          <ion-card-header>
            <ion-card-title>{{ rev.title || tkey('no_title') }}</ion-card-title>
            <ion-card-subtitle>
              <span *ngFor="let s of [1,2,3,4,5]; let i = index" [class.filled]="(i+1) <= (rev.rating || 0)">
                <ion-icon [name]="(i+1) <= (rev.rating || 0) ? 'star' : 'star-outline'"></ion-icon>
              </span>
            </ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <p>{{ rev.description }}</p>
            <div class="photos" *ngIf="rev.photos && rev.photos.length">
              <img *ngFor="let p of rev.photos; let pi = index" [src]="p" [class.enlarged]="isPhotoExpanded(ri, pi)" (click)="togglePhotoSize(ri, pi)" />
            </div>
            <small>{{ rev.createdAt ? (rev.createdAt | date:'short') : '' }}</small>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
