<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <div class="menu-header" style="padding:16px;">
          <div *ngIf="currentUser; else guest">
            <div style="font-weight:600">{{ currentUser.nome || currentUser.email }}</div>
            <div style="font-size:0.9em; color:var(--ion-color-medium)">{{ currentUser.email }}</div>
            <div style="font-size:0.85em; color:var(--ion-color-medium); margin-top:4px;">{{ currentUser.profileType }}</div>
          </div>
          <ng-template #guest>
            <div style="font-weight:600">Guest</div>
            <div style="font-size:0.9em; color:var(--ion-color-medium)">guest</div>
          </ng-template>
        </div>

        <ion-list id="inbox-list">
          <ion-menu-toggle auto-hide="false">
            <ion-item routerDirection="root" routerLink="/folder/inbox" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" ios="map-outline" md="map-sharp"></ion-icon>
              <ion-label>{{ t('map') }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>

        <ion-list id="profile-menu" *ngIf="currentUser">
          <ion-list-header>Profile Options</ion-list-header>
          
          <ion-menu-toggle auto-hide="false" *ngIf="isProfileType('Cliente')">
            <ion-item routerDirection="root" routerLink="/folder/client-dashboard" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" ios="person-outline" md="person-sharp"></ion-icon>
              <ion-label>Client Dashboard</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false" *ngIf="isProfileType('Admin')">
            <ion-item routerDirection="root" routerLink="/folder/admin-panel" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" ios="settings-outline" md="settings-sharp"></ion-icon>
              <ion-label>Admin Panel</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false" *ngIf="isProfileType('Gestor')">
            <ion-item routerDirection="root" routerLink="/folder/manager-dashboard" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" ios="briefcase-outline" md="briefcase-sharp"></ion-icon>
              <ion-label>Manager Dashboard</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
