

<ion-content>
  <div *ngIf="locationError" class="error">{{ locationError }}</div>
  <div *ngIf="errorMsg" class="error">{{ errorMsg }}</div>
  <div *ngIf="weatherError" class="error">{{ weatherError }}</div>

  <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>
  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button color="primary" (click)="retryLocation()" title="{{ t('refresh_location') }}">
      <ion-icon name="refresh"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>


<ion-card *ngIf="weather" class="weather-card" (click)="openWeatherForecast()">
  <ion-card-content>
    <div class="weather-info">
      <img [src]="'https://openweathermap.org/img/wn/' + weather.icon + '@2x.png'" alt="Weather icon" class="weather-icon">
      <div class="weather-details">
        <h3>{{ weather.temperature }}°C</h3>
        <p>{{ getTranslatedWeatherDescription(weather.weatherCode) }}</p>
        <p *ngIf="weather.city && weather.country" class="location">{{ weather.city }}, {{ weather.country }}</p>
      </div>
    </div>
  </ion-card-content>
</ion-card>
