<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ t.translate('create_company') }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ t.translate('create_company') }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    <ion-item>
      <ion-label position="stacked">{{ t.translate('company_name') }}</ion-label>
      <ion-input [(ngModel)]="nome" type="text"></ion-input>
    </ion-item>
    <ion-item>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">{{ t.translate('company_phone') }}</ion-label>
      <ion-input [(ngModel)]="telefone" type="text"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">NIF</ion-label>
      <ion-input [(ngModel)]="nif" type="text"></ion-input>
    </ion-item>
  </ion-list>

</ion-content>

<ion-footer class="ion-padding">
  <ion-button (click)="createCompany()" [disabled]="!nome || loading" style="display:block;margin:12px auto;width:60%">{{ t.translate('save') }}</ion-button>
</ion-footer>
