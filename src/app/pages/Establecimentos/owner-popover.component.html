<ion-content class="ion-padding">
  <ion-searchbar debounce="200" [(ngModel)]="q" placeholder="Filter by email"></ion-searchbar>

  <ion-list>
    <ion-item *ngFor="let u of filtered" (click)="select(u)">
      <ion-label>
        <h3>{{ u.nome || u.email }}</h3>
        <p style="font-size:0.9em; color:var(--ion-color-medium)">{{ u.email }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-button expand="block" fill="clear" (click)="close()">Close</ion-button>
</ion-content>
