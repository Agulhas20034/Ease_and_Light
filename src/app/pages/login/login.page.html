<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ t('login') }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="tService.toggleLang()">{{ tService.getLang().toUpperCase() }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">
    <div class="form-inner">
      <h1>{{ t('welcome_back') }}</h1>

      <ion-list>
        <ion-item>
          <ion-label position="floating">{{ t('email') }}</ion-label>
          <ion-input
            type="email"
            [(ngModel)]="email"
            placeholder="{{ t('email') }}"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">{{ t('password') }}</ion-label>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="{{ t('password') }}"
          ></ion-input>
          <ion-button slot="end" fill="clear" (click)="togglePasswordVisibility()">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </ion-button>
        </ion-item>
      </ion-list>

      <ion-button expand="block" color="primary" (click)="login()" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        {{ loading ? (t('login') + '...') : t('login') }}
      </ion-button>

      <div class="divider">{{ t('or') }}</div>

      <ion-button expand="block" fill="outline" (click)="goToRegister()">
        {{ t('create_new_account') }}
      </ion-button>
    </div>
  </div>
</ion-content>
